{% extends "base.html" %}

{% block title %}Register - SocketStream{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-shell">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white text-center">
                <h4><i class="fas fa-user-plus"></i> SocketStream Registration</h4>
            </div>
            <div class="card-body">
                <div id="alert-container"></div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="form-text">
                            <small>Password must be at least 8 characters long</small>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-user-plus"></i> Register
                        </button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p>Already have an account? <a href="/login" class="text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const registerForm = document.getElementById('registerForm');
    const alertContainer = document.getElementById('alert-container');
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');

    // Toggle password visibility
    togglePassword.addEventListener('click', function() {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.querySelector('i').classList.toggle('fa-eye');
        this.querySelector('i').classList.toggle('fa-eye-slash');
    });

    // Handle form submission
    registerForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!/^[A-Za-z0-9_]{3,32}$/.test(username)) {
            showAlert('warning', 'Username must be 3-32 characters: letters, digits, underscore');
            return;
        }
        if (password.length < 8) {
            showAlert('warning', 'Password must be at least 8 characters long');
            return;
        }
        if (password !== confirmPassword) {
            showAlert('warning', 'Passwords do not match');
            return;
        }

        const submitBtn = registerForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        showAlert('info', 'Generating your encryption keys in this browser...');

        try {
            // Keys are generated here and never leave the device unencrypted.
            const identity = await SSCrypto.generateIdentity();
            const wrapped = await SSCrypto.wrapPrivateKey(identity.privateKey, password);

            const res = await fetch('/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, public_key: identity.publicKeyB64 })
            });
            const data = await res.json();

            if (data.success) {
                // Persist the password-wrapped key locally; unlock it for this tab.
                SSCrypto.storeWrapped(username, wrapped);
                await SSCrypto.cacheUnlocked(username, identity.privateKey);
                showAlert('success', 'Account created. Redirecting...');
                setTimeout(() => { window.location.href = '/chat'; }, 800);
            } else {
                showAlert('danger', data.message || 'Registration failed');
                submitBtn.disabled = false;
            }
        } catch (err) {
            showAlert('danger', 'Key generation failed: ' + err.message);
            submitBtn.disabled = false;
        }
    });

    function showAlert(type, message) {
        alertContainer.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
    }
});
</script>
{% endblock %}
