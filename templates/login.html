{% extends "base.html" %}

{% block title %}Login - SocketStream{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center auth-shell">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fas fa-lock"></i> SocketStream Login</h4>
            </div>
            <div class="card-body">
                <div id="alert-container"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </div>
                </form>
                <hr>
                <div class="text-center">
                    <p class="mb-1">Don't have an account? <a href="/register" class="text-decoration-none">Register here</a></p>
                    <p class="mb-0"><small class="text-muted">New device? <a href="#" id="importKeyLink" class="text-decoration-none">Import your key backup</a></small></p>
                    <input type="file" id="keyBackupFile" accept="application/json" class="d-none">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alert-container');
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');

    // Toggle password visibility
    togglePassword.addEventListener('click', function() {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.querySelector('i').classList.toggle('fa-eye');
        this.querySelector('i').classList.toggle('fa-eye-slash');
    });

    const importKeyLink = document.getElementById('importKeyLink');
    const keyBackupFile = document.getElementById('keyBackupFile');
    let importedBlob = null;

    importKeyLink.addEventListener('click', function(e) {
        e.preventDefault();
        keyBackupFile.click();
    });
    keyBackupFile.addEventListener('change', async function() {
        const file = this.files[0];
        if (!file) return;
        try {
            importedBlob = JSON.parse(await file.text());
            showAlert('info', 'Key backup loaded. Enter your username & password and log in to unlock it.');
        } catch (err) {
            showAlert('danger', 'Could not read key backup file.');
        }
    });

    // Unlock the local (or imported) private key with the password.
    async function unlockKey(username, password) {
        if (importedBlob) {
            const key = await SSCrypto.unwrapPrivateKey(importedBlob, password);
            SSCrypto.storeWrapped(username, importedBlob);   // persist on this device
            await SSCrypto.cacheUnlocked(username, key);
            return true;
        }
        if (SSCrypto.hasWrapped(username)) {
            const key = await SSCrypto.unwrapPrivateKey(SSCrypto.loadWrapped(username), password);
            await SSCrypto.cacheUnlocked(username, key);
            return true;
        }
        return false; // authenticated, but no key on this device
    }

    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        submitBtn.disabled = true;

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!data.success) {
                showAlert('danger', data.message);
                submitBtn.disabled = false;
                return;
            }

            const unlocked = await unlockKey(username, password);
            if (!unlocked) {
                showAlert('warning', 'Logged in, but your private key is not on this device. ' +
                    'Use "Import your key backup" to restore it, then log in again.');
                submitBtn.disabled = false;
                return;
            }
            showAlert('success', 'Unlocked. Redirecting...');
            setTimeout(() => { window.location.href = '/chat'; }, 700);
        } catch (err) {
            // Wrong password fails AES-GCM auth during unwrap.
            showAlert('danger', 'Could not unlock your key (wrong password?): ' + err.message);
            submitBtn.disabled = false;
        }
    });

    function showAlert(type, message) {
        alertContainer.innerHTML = `
            <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        `;
    }
});
</script>
{% endblock %}
